# PATH: .github/workflows/ci.yml
# WHAT: CI pipeline for typecheck, lint, and tests
# WHY:  Blocks broken code from reaching main and mirrors local pre-commit checks
# RELEVANT: package.json,pnpm-lock.yaml,services/api/package.json

name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck Lint Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI checks
        run: pnpm check:ci
